services:
  backend-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: simastemu-backend-test
    command: npm run test:e2e
    env_file:
      - .env.test
    environment:
      NODE_ENV: test
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: simastemu-db-test
    env_file:
      - .env.test
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data_test:
